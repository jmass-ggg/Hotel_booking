services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hotelBook
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Kanye@12"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  

  web:
    build: .
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput || true &&
      gunicorn hotel_booking.wsgi:application --bind 0.0.0.0:8000
      "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: hotel_booking.settings

      DB_NAME: hotelBook
      DB_USER: postgres
      DB_PASSWORD: "Kanye@12"   
      DB_HOST: db
      DB_PORT: "5432"

      DEBUG: "1"
      SECRET_KEY: "change-me"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
    depends_on:
      - db

volumes:
  postgres_data: